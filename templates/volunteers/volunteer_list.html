{% extends "base.html" %}
{% block title %}Volunteers{% endblock %}
{% block content %}
<h2 class="mb-4">Volunteers</h2>
<div class="row g-3">
    {% for profile in page_obj %}
    <div class="col-md-4">
        <div class="card p-3">
            <h6>{{ profile.user.get_full_name|default:profile.user.username }}</h6>
            <span class="badge bg-warning text-dark mb-2" style="width:fit-content;">{{ profile.badge_level }}</span>
            <a href="{% url 'volunteers:profile_detail' profile.user.pk %}" class="btn btn-sm btn-outline-success">View</a>
        </div>
    </div>
    {% endfor %}
</div>
{% include "partials/pagination.html" %}
{% endblock %}
