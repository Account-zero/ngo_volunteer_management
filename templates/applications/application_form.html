{% extends "base.html" %}
{% block title %}Apply{% endblock %}
{% block content %}
<div class="card p-4">
    <h3 class="mb-1">Apply to: {{ opportunity.title }}</h3>
    <p class="text-muted">{{ opportunity.organization.name }}</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button class="btn btn-success" type="submit">Submit Application</button>
    </form>
</div>
{% endblock %}
